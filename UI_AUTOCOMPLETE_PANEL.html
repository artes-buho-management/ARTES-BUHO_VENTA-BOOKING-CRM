<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: #0d1d2e;
        background:
          radial-gradient(circle at 8% 8%, rgba(118, 229, 255, 0.28), transparent 34%),
          radial-gradient(circle at 88% 16%, rgba(160, 255, 210, 0.25), transparent 30%),
          linear-gradient(155deg, #eef9ff 0%, #f7fbff 48%, #e9fff5 100%);
      }
      .wrap {
        padding: 18px 20px 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(63, 133, 173, 0.25);
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(24, 61, 94, 0.12);
      }
      .hero {
        padding: 16px;
        margin-bottom: 12px;
      }
      .title {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 6px;
      }
      .subtitle {
        margin: 0;
        font-size: 13px;
        color: #36526a;
      }
      .bar-wrap {
        margin-top: 14px;
        height: 26px;
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid #74b4d8;
        background: #dff1fb;
      }
      .bar {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #16a6ff, #00b891);
        transition: width 0.2s ease;
      }
      .percent {
        margin-top: 10px;
        font-size: 34px;
        font-weight: 800;
      }
      .status {
        margin: 6px 0 0;
        min-height: 24px;
        font-size: 14px;
      }
      .status.done {
        color: #11663f;
        font-weight: 700;
      }
      .status.error {
        color: #9c1c2a;
        font-weight: 700;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(100px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }
      .stat {
        padding: 10px;
        border-radius: 12px;
        border: 1px solid rgba(34, 84, 127, 0.2);
        background: rgba(255, 255, 255, 0.9);
      }
      .label {
        font-size: 11px;
        text-transform: uppercase;
        color: #4e6780;
      }
      .value {
        margin-top: 4px;
        font-size: 24px;
        font-weight: 800;
      }
      .events {
        height: 220px;
        overflow: auto;
        padding: 10px 12px;
        font-size: 12px;
        border-radius: 12px;
        border: 1px solid rgba(28, 76, 116, 0.26);
        background: #f5fbff;
        white-space: pre-wrap;
        line-height: 1.4;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .primary {
        background: linear-gradient(90deg, #1089d9, #0ab891);
        color: #fff;
      }
      .secondary {
        background: #dce9f3;
        color: #21374d;
      }
      .footer {
        margin-top: 10px;
        font-size: 11px;
        color: #5a748b;
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card hero">
        <h1 class="title">AUTOCOMPLETADO IA DE CELDAS</h1>
        <p class="subtitle">Completa celdas vacías. Si no encuentra dato web: IA NO ENCUENTRA.</p>
        <div class="bar-wrap"><div id="bar" class="bar"></div></div>
        <div id="percent" class="percent">0%</div>
        <div id="status" class="status">Listo para iniciar.</div>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">Celdas rellenadas</div><div id="filled" class="value">0</div></div>
        <div class="stat"><div class="label">IA NO ENCUENTRA</div><div id="notFound" class="value">0</div></div>
        <div class="stat"><div class="label">Busquedas web</div><div id="web" class="value">0</div></div>
      </div>

      <div id="events" class="events card">Sin actividad todavía.</div>

      <div class="actions">
        <button id="startBtn" class="primary" onclick="startAutocomplete()">INICIAR AUTOCOMPLETADO</button>
        <button id="closeBtn" class="secondary" onclick="google.script.host.close()">CERRAR</button>
      </div>
      <div class="footer">RUBEN COTON | ARTES BUHO</div>
    </div>

    <script>
      let running = false;

      function setProgress(percent, text) {
        const p = Math.max(0, Math.min(100, Number(percent || 0)));
        document.getElementById("bar").style.width = p + "%";
        document.getElementById("percent").textContent = p + "%";
        if (text) document.getElementById("status").textContent = text;
      }

      function setStatusClass(kind) {
        const el = document.getElementById("status");
        el.className = "status" + (kind ? " " + kind : "");
      }

      function setError(text) {
        setStatusClass("error");
        document.getElementById("status").textContent = text || "Error de autocompletado";
      }

      function setDone(text) {
        setStatusClass("done");
        document.getElementById("status").textContent = text || "Autocompletado completado";
      }

      function setButtons(isRunning) {
        document.getElementById("startBtn").disabled = isRunning;
        document.getElementById("closeBtn").disabled = isRunning;
      }

      function updateStats(stats) {
        const s = stats || {};
        document.getElementById("filled").textContent = Number(s.cellsFilled || 0);
        document.getElementById("notFound").textContent = Number(s.iaNoEncuentra || 0);
        document.getElementById("web").textContent = Number(s.webLookups || 0);
      }

      function updateEvents(list) {
        const events = Array.isArray(list) ? list : [];
        document.getElementById("events").textContent = events.length
          ? events.join("\n")
          : "Sin actividad todavía.";
      }

      function startAutocomplete() {
        if (running) return;
        running = true;
        setButtons(true);
        setStatusClass("");
        setProgress(0, "Preparando autocompletado...");
        updateStats({});
        updateEvents([]);

        google.script.run
          .withSuccessHandler((res) => {
            if (!res || !res.ok) {
              running = false;
              setButtons(false);
              setError("No se pudo iniciar el autocompletado.");
              return;
            }
            setProgress(res.percent || 0, "Autocompletado iniciado...");
            updateStats(res.stats);
            updateEvents(res.recentEvents);
            runStep();
          })
          .withFailureHandler((err) => {
            running = false;
            setButtons(false);
            setError("Error al iniciar: " + (err && err.message ? err.message : err));
          })
          .codexUiIniciarAutocompletadoCeldas();
      }

      function runStep() {
        google.script.run
          .withSuccessHandler((res) => {
            if (!res || !res.ok) {
              running = false;
              setButtons(false);
              setError("Fallo durante el autocompletado.");
              return;
            }

            const msg =
              (res.currentSheet ? "Pestana: " + res.currentSheet + " | " : "") +
              (res.message || "") +
              (res.totalRows ? " (" + res.doneRows + "/" + res.totalRows + ")" : "");

            setProgress(res.percent || 0, msg);
            updateStats(res.stats);
            updateEvents(res.recentEvents);

            if (res.done) {
              running = false;
              setProgress(100, msg);
              setDone("Autocompletado completado.");
              setButtons(false);
              return;
            }

            setTimeout(runStep, 180);
          })
          .withFailureHandler((err) => {
            running = false;
            setButtons(false);
            setError("Error durante el autocompletado: " + (err && err.message ? err.message : err));
          })
          .codexUiAutocompletarPaso();
      }
    </script>
  </body>
</html>
